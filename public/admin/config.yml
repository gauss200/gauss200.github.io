backend:
  name: github
  repo: gauss200/gauss200.github.io
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: pages
    label: Pages
    folder: src/content/pages
    create: false
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Subtitle, name: subtitle, widget: string, required: false }
      - { label: Intro, name: intro, widget: text, required: false }
      - { label: Photo, name: photo, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: publications
    label: Publications
    folder: src/content/publications
    create: true
    slug: "{{fields.year}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Authors, name: authors, widget: string }
      - { label: Journal, name: journal, widget: string }
      - { label: Year, name: year, widget: number, value_type: int }
      - { label: DOI, name: doi, widget: string, required: false }
      - { label: Abstract, name: abstract, widget: text, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: patents
    label: Patents
    folder: src/content/patents
    create: true
    slug: "{{fields.year}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Patent Number, name: patent_number, widget: string }
      - { label: Year, name: year, widget: number, value_type: int }
      - { label: Co-Inventors, name: co_inventors, widget: string, required: false }
      - { label: Assignee, name: assignee, widget: string, required: false }
      - { label: Abstract, name: abstract, widget: text, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: projects
    label: "Research Projects"
    folder: src/content/projects
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Status, name: status, widget: select, options: ["active", "completed"] }
      - { label: Start Year, name: year_start, widget: number, value_type: int }
      - { label: End Year, name: year_end, widget: string, required: false }
      - { label: Summary, name: summary, widget: text }
      - { label: Display Order, name: order, widget: number, value_type: int, default: 0 }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: diagram_sections
    label: "Diagram Sections (Quantum Foundations)"
    folder: src/content/diagram_sections
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: Diagram
        name: diagram
        widget: select
        options:
          - { label: "Two Coupled Modes — Fields & Envelopes", value: "TwoModeCoupler" }
          - { label: "Co-Propagating Coupled Modes", value: "CoPropagatingModes" }
          - { label: "Coupled Waveguides — Energy Transfer", value: "CoupledWaveguides" }
          - { label: "Counter-Propagating Waves", value: "CounterPropagating" }
          - { label: "Quantum Tunneling ↔ Evanescent Coupling", value: "QuantumTunneling" }
          - { label: "Quantum Measurement", value: "QuantumMeasurement" }
          - { label: "Periodic Boundary Conditions", value: "PeriodicCoupledModes" }
          - { label: "Coupling to a Continuum", value: "ContinuumDecay" }
          - { label: "EPR Experiment", value: "EPRExperiment" }
          - { label: "Fundamental Theorem of Calculus", value: "FundamentalTheorem" }
          - { label: "Action Quantization in Phase Space", value: "ActionQuantization" }
          - { label: "Double Slit — Measurement as Overlap Integral", value: "DoubleSlit" }
      - { label: Display Order, name: order, widget: number, value_type: int, default: 0 }
      - { label: Body, name: body, widget: markdown }

  - name: hobbies
    label: Hobbies
    folder: src/content/hobbies
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Summary, name: summary, widget: text }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Display Order, name: order, widget: number, value_type: int, default: 0 }
      - { label: Body, name: body, widget: markdown }
