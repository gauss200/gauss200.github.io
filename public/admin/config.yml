backend:
  name: github
  repo: gauss200/gauss200.github.io
  branch: main

media_folder: public/essays
public_folder: /essays

collections:
  - name: essays
    label: "Essays"
    folder: src/content/essays
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: Status
        name: status
        widget: select
        options: ["active", "completed"]
        default: active
      - { label: Start Year, name: year_start, widget: number, value_type: int }
      - { label: End Year, name: year_end, widget: string, required: false }
      - { label: Summary (shown on home page card), name: summary, widget: text }
      - { label: Display Order, name: order, widget: number, value_type: int, default: 10 }
      - label: "Card Figure"
        name: figure
        widget: string
        required: false
        hint: "Path to the image shown on the home page card, e.g. /essays/my-essay/figure.svg"
      - label: "Full Interactive Page URL"
        name: complex_page
        widget: string
        required: false
        hint: "URL of the complete interactive version, e.g. /projects/my-essay"
      - label: "PDF Path"
        name: pdf
        widget: string
        required: false
        hint: "Path to the PDF in public/essays/{slug}/full.pdf, e.g. /essays/my-essay/full.pdf"
      - { label: "Condensed Version (Markdown)", name: body, widget: markdown }

  - name: essays_detailed
    label: "Essays — Detailed Versions"
    folder: src/content/essays_detailed
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: "Full Text (Markdown)", name: body, widget: markdown }

  - name: pages
    label: Pages
    folder: src/content/pages
    create: false
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Subtitle, name: subtitle, widget: string, required: false }
      - { label: Intro, name: intro, widget: text, required: false }
      - { label: Photo, name: photo, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: publications
    label: Publications
    folder: src/content/publications
    create: true
    slug: "{{fields.year}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Authors, name: authors, widget: string }
      - { label: Journal, name: journal, widget: string }
      - { label: Year, name: year, widget: number, value_type: int }
      - { label: DOI, name: doi, widget: string, required: false }
      - { label: Abstract, name: abstract, widget: text, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: patents
    label: Patents
    folder: src/content/patents
    create: true
    slug: "{{fields.year}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Patent Number, name: patent_number, widget: string }
      - { label: Year, name: year, widget: number, value_type: int }
      - { label: Co-Inventors, name: co_inventors, widget: string, required: false }
      - { label: Assignee, name: assignee, widget: string, required: false }
      - { label: Abstract, name: abstract, widget: text, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: diagram_sections
    label: "Diagram Sections (Quantum Foundations)"
    folder: src/content/diagram_sections
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: Diagram
        name: diagram
        widget: select
        options:
          - { label: "Two Coupled Modes", value: "TwoModeCoupler" }
          - { label: "Co-Propagating Coupled Modes", value: "CoPropagatingModes" }
          - { label: "Coupled Waveguides", value: "CoupledWaveguides" }
          - { label: "Counter-Propagating Waves", value: "CounterPropagating" }
          - { label: "Quantum Tunneling", value: "QuantumTunneling" }
          - { label: "Quantum Measurement", value: "QuantumMeasurement" }
          - { label: "Periodic Boundary Conditions", value: "PeriodicCoupledModes" }
          - { label: "Coupling to a Continuum", value: "ContinuumDecay" }
          - { label: "EPR Experiment", value: "EPRExperiment" }
          - { label: "Fundamental Theorem of Calculus", value: "FundamentalTheorem" }
          - { label: "Action Quantization", value: "ActionQuantization" }
          - { label: "Double Slit", value: "DoubleSlit" }
          - { label: "Completeness Relation", value: "CompletenessRelation" }
      - { label: Display Order, name: order, widget: number, value_type: int, default: 0 }
      - { label: Body, name: body, widget: markdown }
