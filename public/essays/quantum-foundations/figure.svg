<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#f5f5f5"/>
  <!-- Bloch sphere wireframe -->
  <ellipse cx="200" cy="100" rx="75" ry="75" stroke="#457b9d" stroke-width="1.2" opacity="0.3"/>
  <ellipse cx="200" cy="100" rx="75" ry="25" stroke="#457b9d" stroke-width="1" opacity="0.25"/>
  <ellipse cx="200" cy="100" rx="25" ry="75" stroke="#457b9d" stroke-width="1" opacity="0.2"/>
  <!-- Axes -->
  <line x1="110" y1="100" x2="290" y2="100" stroke="#999" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="200" y1="20" x2="200" y2="180" stroke="#999" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="292" y="104" font-family="system-ui" font-size="10" fill="#999">x</text>
  <text x="204" y="18" font-family="system-ui" font-size="10" fill="#999">z</text>
  <!-- State vector -->
  <line x1="200" y1="100" x2="248" y2="48" stroke="#e63946" stroke-width="2.5"/>
  <circle cx="248" cy="48" r="4" fill="#e63946"/>
  <!-- State label -->
  <text x="255" y="45" font-family="system-ui" font-size="10" fill="#e63946">|&#968;&#10217;</text>
  <!-- Precession trail -->
  <path d="M248 48 Q270 65 265 90 Q258 110 235 125 Q210 138 185 130 Q160 118 152 95" stroke="#e63946" stroke-width="1.2" opacity="0.3" fill="none" stroke-dasharray="3,2"/>
  <!-- Coupled waveguide hint bottom-left -->
  <line x1="30" y1="155" x2="120" y2="155" stroke="#2a9d8f" stroke-width="1.5" opacity="0.5"/>
  <line x1="30" y1="170" x2="120" y2="170" stroke="#2a9d8f" stroke-width="1.5" opacity="0.5"/>
  <path d="M50 155 Q60 162 70 155 Q80 148 90 155 Q100 162 110 155" stroke="#2a9d8f" stroke-width="1.2" opacity="0.6" fill="none"/>
  <path d="M50 170 Q60 163 70 170 Q80 177 90 170 Q100 163 110 170" stroke="#2a9d8f" stroke-width="1.2" opacity="0.4" fill="none"/>
  <!-- Energy level hint bottom-right -->
  <line x1="300" y1="150" x2="370" y2="150" stroke="#457b9d" stroke-width="1.5" opacity="0.5"/>
  <line x1="300" y1="175" x2="370" y2="175" stroke="#457b9d" stroke-width="1.5" opacity="0.5"/>
  <text x="310" y="145" font-family="system-ui" font-size="9" fill="#457b9d" opacity="0.6">|1&#10217;</text>
  <text x="310" y="190" font-family="system-ui" font-size="9" fill="#457b9d" opacity="0.6">|2&#10217;</text>
  <line x1="335" y1="152" x2="335" y2="173" stroke="#e63946" stroke-width="1" opacity="0.4" marker-end="url(#arr2)" marker-start="url(#arr2r)"/>
  <defs>
    <marker id="arr2" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4" fill="#e63946" opacity="0.4"/></marker>
    <marker id="arr2r" markerWidth="5" markerHeight="4" refX="0" refY="2" orient="auto"><path d="M5,0 L0,2 L5,4" fill="#e63946" opacity="0.4"/></marker>
  </defs>
</svg>
