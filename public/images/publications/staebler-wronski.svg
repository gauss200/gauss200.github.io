<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#f8f8f8"/>
  <!-- Stretched exponential curve -->
  <path d="M60 160 Q100 158 140 145 Q180 125 220 95 Q260 65 300 45 Q340 35 370 32" stroke="#e63946" stroke-width="2.5" fill="none"/>
  <!-- Light exposure arrow -->
  <text x="180" y="180" font-family="system-ui" font-size="10" fill="#666">Light exposure time</text>
  <text x="15" y="95" font-family="system-ui" font-size="9" fill="#666" transform="rotate(-90, 15, 95)">Defect density</text>
  <!-- Axes -->
  <line x1="50" y1="170" x2="380" y2="170" stroke="#333" stroke-width="1"/>
  <line x1="50" y1="170" x2="50" y2="25" stroke="#333" stroke-width="1"/>
  <!-- Annotation -->
  <text x="250" y="75" font-family="system-ui" font-size="9" fill="#e63946">N(t) ~ t^(1/3)</text>
  <text x="80" y="15" font-family="system-ui" font-size="11" fill="#333" font-weight="600">Staebler-Wronski Effect Kinetics</text>
</svg>
