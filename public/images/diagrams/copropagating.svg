<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#f5f5f5"/>
  <!-- Waveguide 1 boundaries -->
  <line x1="30" y1="55" x2="370" y2="55" stroke="#999" stroke-width="0.8"/>
  <line x1="30" y1="85" x2="370" y2="85" stroke="#999" stroke-width="0.8"/>
  <!-- Waveguide 2 boundaries -->
  <line x1="30" y1="115" x2="370" y2="115" stroke="#999" stroke-width="0.8"/>
  <line x1="30" y1="145" x2="370" y2="145" stroke="#999" stroke-width="0.8"/>
  <!-- Wave in guide 1 — amplitude decreases along z -->
  <path d="M30 70 Q50 58 70 70 Q90 82 110 70 Q130 58 150 70 Q170 78 190 72 Q210 66 230 72 Q250 76 270 73 Q290 70 310 73 Q330 75 350 73 Q365 72 370 73" stroke="#e63946" stroke-width="2" fill="none"/>
  <!-- Wave in guide 2 — amplitude increases along z -->
  <path d="M30 130 Q50 129 70 130 Q90 131 110 130 Q130 128 150 131 Q170 134 190 128 Q210 122 230 132 Q250 140 270 125 Q290 112 310 135 Q330 148 350 120 Q365 110 370 130" stroke="#457b9d" stroke-width="2" fill="none"/>
  <!-- Evanescent coupling region (faint vertical lines between guides) -->
  <line x1="80" y1="87" x2="80" y2="113" stroke="#2a9d8f" stroke-width="0.8" opacity="0.3"/>
  <line x1="130" y1="87" x2="130" y2="113" stroke="#2a9d8f" stroke-width="0.8" opacity="0.35"/>
  <line x1="180" y1="87" x2="180" y2="113" stroke="#2a9d8f" stroke-width="0.8" opacity="0.4"/>
  <line x1="230" y1="87" x2="230" y2="113" stroke="#2a9d8f" stroke-width="0.8" opacity="0.45"/>
  <line x1="280" y1="87" x2="280" y2="113" stroke="#2a9d8f" stroke-width="0.8" opacity="0.4"/>
  <line x1="330" y1="87" x2="330" y2="113" stroke="#2a9d8f" stroke-width="0.8" opacity="0.35"/>
  <!-- Direction arrow -->
  <line x1="30" y1="180" x2="370" y2="180" stroke="#666" stroke-width="0.8" marker-end="url(#zarr)"/>
  <text x="375" y="184" font-family="system-ui" font-size="10" fill="#666">z</text>
  <!-- Labels -->
  <text x="35" y="50" font-family="system-ui" font-size="9" fill="#e63946">Guide 1</text>
  <text x="35" y="160" font-family="system-ui" font-size="9" fill="#457b9d">Guide 2</text>
  <text x="170" y="105" font-family="system-ui" font-size="8" fill="#2a9d8f" opacity="0.6">evanescent coupling</text>
  <!-- Amplitude envelope hint -->
  <path d="M30 70 Q110 60 200 70 Q290 78 370 73" stroke="#e63946" stroke-width="0.8" fill="none" stroke-dasharray="3,3" opacity="0.4"/>
  <path d="M30 130 Q110 130 200 130 Q290 125 370 120" stroke="#457b9d" stroke-width="0.8" fill="none" stroke-dasharray="3,3" opacity="0.4"/>
  <defs>
    <marker id="zarr" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#666"/></marker>
  </defs>
</svg>
