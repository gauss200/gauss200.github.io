  <path d="M30 180 Q80 178 130 160 Q180 130 220 90 Q250 60 280 45 Q320 30 370 25" stroke="#457b9d" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <!-- Axes -->
  <line x1="25" y1="185" x2="380" y2="185" stroke="#333" stroke-width="0.8"/>
  <line x1="25" y1="185" x2="25" y2="15" stroke="#333" stroke-width="0.8"/>
  <!-- Scatter dots (agents/particles) -->
  <circle cx="80" cy="130" r="3" fill="#2a9d8f" opacity="0.5"/>
  <circle cx="120" cy="110" r="3" fill="#2a9d8f" opacity="0.5"/>
  <circle cx="160" cy="90" r="3" fill="#2a9d8f" opacity="0.5"/>
  <circle cx="200" cy="75" r="3" fill="#2a9d8f" opacity="0.5"/>
  <circle cx="240" cy="60" r="3" fill="#2a9d8f" opacity="0.5"/>
  <circle cx="280" cy="50" r="3" fill="#2a9d8f" opacity="0.5"/>
  <circle cx="320" cy="42" r="3" fill="#2a9d8f" opacity="0.5"/>
  <circle cx="100" cy="145" r="3" fill="#2a9d8f" opacity="0.5"/>
  <circle cx="180" cy="105" r="3" fill="#2a9d8f" opacity="0.5"/>
  <circle cx="260" cy="55" r="3" fill="#2a9d8f" opacity="0.5"/>
  <!-- Legend -->
  <line x1="280" y1="165" x2="300" y2="165" stroke="#e63946" stroke-width="2"/>
  <text x="305" y="169" font-family="system-ui" font-size="9" fill="#666">Market</text>
  <line x1="280" y1="178" x2="300" y2="178" stroke="#457b9d" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="305" y="182" font-family="system-ui" font-size="9" fill="#666">Boltzmann</text>
</svg>
