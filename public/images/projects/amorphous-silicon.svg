<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#f5f5f5"/>
  <!-- Amorphous network -->
  <circle cx="100" cy="60" r="8" fill="#457b9d" opacity="0.6"/>
  <circle cx="140" cy="45" r="8" fill="#457b9d" opacity="0.6"/>
  <circle cx="180" cy="65" r="8" fill="#457b9d" opacity="0.6"/>
  <circle cx="120" cy="90" r="8" fill="#457b9d" opacity="0.6"/>
  <circle cx="160" cy="85" r="8" fill="#457b9d" opacity="0.6"/>
  <circle cx="200" cy="95" r="8" fill="#457b9d" opacity="0.6"/>
  <circle cx="240" cy="55" r="8" fill="#457b9d" opacity="0.6"/>
  <circle cx="220" cy="75" r="8" fill="#457b9d" opacity="0.6"/>
  <circle cx="260" cy="85" r="8" fill="#457b9d" opacity="0.6"/>
  <circle cx="300" cy="70" r="8" fill="#457b9d" opacity="0.6"/>
  <circle cx="280" cy="110" r="8" fill="#457b9d" opacity="0.6"/>
  <circle cx="140" cy="120" r="8" fill="#457b9d" opacity="0.6"/>
  <circle cx="200" cy="130" r="8" fill="#457b9d" opacity="0.6"/>
  <circle cx="240" cy="120" r="8" fill="#457b9d" opacity="0.6"/>
  <!-- Bonds -->
  <line x1="100" y1="60" x2="140" y2="45" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <line x1="140" y1="45" x2="180" y2="65" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="60" x2="120" y2="90" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <line x1="120" y1="90" x2="160" y2="85" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <line x1="160" y1="85" x2="180" y2="65" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <line x1="180" y1="65" x2="220" y2="75" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="95" x2="220" y2="75" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <line x1="240" y1="55" x2="220" y2="75" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <line x1="240" y1="55" x2="260" y2="85" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="95" x2="260" y2="85" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <line x1="260" y1="85" x2="300" y2="70" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <line x1="260" y1="85" x2="280" y2="110" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <line x1="120" y1="90" x2="140" y2="120" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="95" x2="200" y2="130" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="130" x2="240" y2="120" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <line x1="240" y1="120" x2="280" y2="110" stroke="#457b9d" stroke-width="1.5" opacity="0.4"/>
  <!-- Dangling bond (defect) -->
  <circle cx="160" cy="85" r="4" fill="#e63946"/>
  <line x1="160" y1="85" x2="160" y2="115" stroke="#e63946" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="165" y="120" font-family="system-ui" font-size="9" fill="#e63946">dangling bond</text>
  <!-- Hydrogen -->
  <circle cx="120" cy="90" r="3" fill="#2a9d8f"/>
  <text x="90" y="108" font-family="system-ui" font-size="9" fill="#2a9d8f">H</text>
</svg>
